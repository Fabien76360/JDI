<head>

  <style>
    :root { --bg:#F0EDE6; --bg-card:#FAFAF7; --bg-dark:#1C2B3A; --primary:#1C2B3A; --c-orange:#E8631A; --c-green:#2B7A4B; --c-amber:#B07A00; --c-red:#C0392B; --c-blue:#2567A0; --c-gold:#C49A00; --border:#CCC7BB; --border-str:#A89E92; --text:#1C2B3A; --text-muted:#6B6358; --text-light:#9A9288; --r:3px; --sh:0 2px 8px rgba(28,43,58,.09); --sh2:0 4px 16px rgba(28,43,58,.14); }
    *{box-sizing:border-box;} html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:"Barlow",sans-serif;} body{min-height:100vh;display:flex;flex-direction:column;}
    header{position:sticky;top:0;z-index:60;height:50px;background:var(--bg-dark);border-bottom:3px solid var(--c-orange);box-shadow:var(--sh);} .header-row{max-width:1360px;margin:0 auto;height:47px;padding:0 14px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
    .brand{font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:1.28rem;text-transform:uppercase;letter-spacing:.03em;color:#fff;line-height:1;white-space:nowrap;} .brand-do{color:var(--c-orange);} .top-nav{display:flex;align-items:stretch;gap:12px;height:100%;}
    .top-nav a{display:inline-flex;align-items:center;text-decoration:none;color:rgba(255,255,255,.82);font-family:"Barlow Condensed",sans-serif;font-weight:600;text-transform:uppercase;font-size:.74rem;letter-spacing:.08em;border-bottom:3px solid transparent;padding:0 2px;} .top-nav a:hover{color:#fff;} .top-nav a.active{color:var(--c-orange);border-bottom-color:var(--c-orange);}
    .container{width:min(1360px,calc(100% - 24px));margin:14px auto;padding:14px;flex:1;} .page-header{margin-bottom:16px;padding:12px 14px;border:1px solid var(--border);border-left:4px solid var(--c-orange);background:linear-gradient(180deg,#faf8f2 0%,#f4f0e7 100%);border-radius:var(--r);box-shadow:var(--sh);} .page-title{margin:0;font-family:"Barlow Condensed",sans-serif;font-size:1.5rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;line-height:1;} .page-subtitle{margin:7px 0 0;color:var(--text-muted);font-size:.84rem;font-weight:500;}
    .zone{margin-bottom:1.5rem;border:1px solid var(--border);background:var(--bg-card);border-radius:var(--r);box-shadow:var(--sh);} .zone-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 12px 8px;border-bottom:1px dashed #d8d2c8;} .zone-title{margin:0;display:inline-flex;align-items:center;gap:8px;font-family:"Barlow Condensed",sans-serif;font-size:.98rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;} .zone-num{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:20px;border-radius:var(--r);background:var(--c-orange);color:#fff;font-family:"Barlow Condensed",sans-serif;font-size:.74rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:0 6px;}
    .zone>.toolbar,.zone>.table-wrapper{margin:12px;} .toolbar{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap;} label{display:block;margin:0 0 5px;font-family:"Barlow Condensed",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:.7rem;color:var(--text-muted);} select,input,textarea{width:100%;padding:9px 10px;border:1px solid var(--border-str);border-radius:var(--r);background:#fffdf9;color:var(--text);font-family:"Barlow",sans-serif;font-size:.9rem;} select:focus,input:focus,textarea:focus{outline:none;border-color:var(--c-blue);box-shadow:0 0 0 2px rgba(37,103,160,.12);} .form-note{font-family:"DM Mono",monospace;font-size:.66rem;color:var(--text-light);}
    .table-wrapper{border:1px solid var(--border);border-radius:var(--r);background:#f9f8f4;overflow:auto;max-height:510px;} table{width:100%;border-collapse:collapse;} thead th{position:sticky;top:0;z-index:1;text-align:left;background:var(--bg);border-bottom:2px solid var(--border-str);color:var(--text-muted);font-family:"Barlow Condensed",sans-serif;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:8px;} tbody td{border-bottom:1px solid #e3ddd2;padding:9px 8px;font-size:.84rem;} tbody tr:hover{background:rgba(232,99,26,.03);} tbody tr{cursor:pointer;}
    .mono{font-family:"DM Mono",monospace;font-size:.75rem;font-weight:500;} .badge{display:inline-flex;align-items:center;border:1px solid var(--border-str);border-radius:999px;padding:2px 8px;font-family:"Barlow Condensed",sans-serif;font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;} .badge.complete{color:var(--c-green);background:#edf5ef;border-color:#96b9a1;} .badge.en-cours{color:var(--c-amber);background:#f8f1e5;border-color:#cab38f;} .badge.annule{color:var(--c-red);background:#f9ece9;border-color:#d8aaa2;}
    footer{background:var(--bg-dark);border-top:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.45);font-family:"DM Mono",monospace;font-size:.7rem;padding:9px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;} .footer-brand{display:inline-flex;align-items:center;gap:8px;} .footer-brand img{height:18px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.85);border-radius:2px;padding:1px 2px;}
    @media (max-width:760px){header{height:auto;}.header-row{height:auto;padding:8px 10px;flex-direction:column;align-items:flex-start;}.top-nav{flex-wrap:wrap;}.container{width:calc(100% - 14px);padding:8px;}}
  </style>
</head>
<body>

    <div class="header-row">
      <div class="brand">JUST <span class="brand-do">DO</span> IT</div>
      <nav class="top-nav">

  <main class="container">
    <div class="page-header">
      <h1 class="page-title">Liste JDI</h1>
      <p class="page-subtitle">Consultation simple des JDI avec filtre secteur</p>
    </div>

    <section class="zone">
      <div class="zone-hdr">
        <h2 class="zone-title"><span class="zone-num">01</span> Filtres</h2>
      </div>
      <div class="toolbar">
        <div>
          <label for="secteurFilter">Filtre secteur</label>
          <select id="secteurFilter">
            <option value="">Tous les secteurs</option>
          </select>
        </div>
        <div id="rowCount" class="form-note"></div>
      </div>
    </section>

    <section class="zone">
      <div class="zone-hdr">
        <h2 class="zone-title"><span class="zone-num">02</span> Tableau JDI</h2>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Numero JDI</th>
              <th>Libelle</th>
              <th>Secteur</th>
              <th>Statut</th>
              <th>Date d'ouverture</th>
            </tr>
          </thead>
          <tbody id="jdiRows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer>
    <div id="currentUser">Utilisateur:</div>
    <div class="footer-brand">
      <span>Entreprise:</span>
      <img src="img/company-logo.svg" alt="Logo entreprise">
    </div>
  </footer>
